apiVersion: v1
kind: Namespace
metadata:
  name: webchat
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: webchat-config
  namespace: webchat
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: webchat
  DB_USER: webchat
  DB_SYNC: "true"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_URL: redis://redis:6379
  RABBITMQ_EXCHANGE: chat.events
  RABBITMQ_QUEUE: websocket.message-events
  AUTH_SERVICE_URL: http://auth-service:3000
  CHAT_SERVICE_URL: http://chat-service:3000
  CORS_ORIGIN: "*"
---
apiVersion: v1
kind: Secret
metadata:
  name: webchat-secrets
  namespace: webchat
type: Opaque
stringData:
  DB_PASSWORD: change-me
  POSTGRES_PASSWORD: change-me
  RABBITMQ_USER: webchat
  RABBITMQ_PASSWORD: change-me
  RABBITMQ_URL: amqp://webchat:change-me@rabbitmq:5672
  JWT_SECRET: replace-with-a-random-secret-containing-at-least-32-characters
