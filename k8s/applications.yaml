apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: webchat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: webchat/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: webchat-config
            - secretRef:
                name: webchat-secrets
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: production
            - name: JWT_EXPIRES_IN
              value: 15m
            - name: BCRYPT_ROUNDS
              value: "12"
            - name: REDIS_PASSWORD
              value: ""
          readinessProbe:
            httpGet:
              path: /auth/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: webchat
spec:
  selector:
    app: auth-service
  ports:
    - port: 3000
---
